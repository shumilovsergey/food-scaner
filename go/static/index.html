<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Сканер еды</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Login screen -->
  <div id="login-screen" class="screen hidden">
    <div class="center-card">
      <div class="app-logo">🥗</div>
      <h1>Сканер еды</h1>
      <p>Войдите, чтобы продолжить</p>
      <a href="/login" class="btn-primary">Войти</a>
    </div>
  </div>

  <!-- Pending screen -->
  <div id="pending-screen" class="screen hidden">
    <div class="center-card">
      <div class="pending-icon">⏳</div>
      <h1>Ожидание доступа</h1>
      <p>Ваш аккаунт на проверке. Как только вас одобрят — можно будет пользоваться приложением.</p>
      <div class="id-block">
        <span class="id-label">Ваш ID</span>
        <span id="pending-auth-id" class="id-value"></span>
      </div>
      <button id="logout-btn-pending" class="btn-secondary">Выйти</button>
    </div>
  </div>

  <!-- Main screen -->
  <div id="main-screen" class="screen hidden">

    <div class="camera-wrapper">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" class="hidden"></canvas>

      <!-- Loading overlay -->
      <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>Анализирую...</p>
      </div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <button id="scan-btn" class="scan-btn">Сканировать</button>
    </div>

    <!-- Result sheet -->
    <div id="result-sheet" class="result-sheet hidden">
      <div class="sheet-handle"></div>

      <div class="food-name" id="result-name"></div>

      <div class="macros-grid">
        <div class="macro-card macro-cal">
          <span class="macro-value" id="result-calories"></span>
          <span class="macro-label">ккал</span>
        </div>
        <div class="macro-card">
          <span class="macro-value" id="result-grams"></span>
          <span class="macro-label">граммы</span>
        </div>
        <div class="macro-card">
          <span class="macro-value" id="result-proteins"></span>
          <span class="macro-label">белки, г</span>
        </div>
        <div class="macro-card">
          <span class="macro-value" id="result-fats"></span>
          <span class="macro-label">жиры, г</span>
        </div>
        <div class="macro-card">
          <span class="macro-value" id="result-carbs"></span>
          <span class="macro-label">углеводы, г</span>
        </div>
      </div>

      <div class="sheet-divider"></div>

      <div class="user-info">
        <div class="user-info-row">
          <span class="user-info-label">Ваш ID</span>
          <span id="result-auth-id" class="user-info-value mono"></span>
        </div>
        <div class="user-info-row">
          <span class="user-info-label">Осталось сканов сегодня</span>
          <span id="result-scans-left" class="user-info-value"></span>
        </div>
      </div>

      <button id="close-result-btn" class="btn-primary">Закрыть</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
