<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Food Scanner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Login screen -->
  <div id="login-screen" class="screen hidden">
    <div class="center-card">
      <h1>Food Scanner</h1>
      <p>Sign in to continue</p>
      <a href="/login" class="btn-primary">Sign in</a>
    </div>
  </div>

  <!-- Pending approval screen -->
  <div id="pending-screen" class="screen hidden">
    <div class="center-card">
      <div class="pending-icon">&#9203;</div>
      <h1>Waiting for approval</h1>
      <p>Your account is pending review. You'll be able to use the app once approved.</p>
      <p class="user-id-line">Your ID: <span id="pending-auth-id" class="user-id"></span></p>
      <button id="logout-btn-pending" class="btn-secondary">Sign out</button>
    </div>
  </div>

  <!-- Main screen -->
  <div id="main-screen" class="screen hidden">
    <div class="header">
      <span class="app-title">Food Scanner</span>
      <div class="header-right">
        <span id="scan-counter" class="scan-counter"></span>
        <button id="logout-btn" class="icon-btn" title="Sign out">&#10551;</button>
      </div>
    </div>

    <div class="camera-wrapper">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" class="hidden"></canvas>
      <div id="loading-overlay" class="overlay hidden">
        <div class="spinner"></div>
        <p>Analyzing food...</p>
      </div>
    </div>

    <div id="result-card" class="result-card hidden">
      <button id="close-result-btn" class="close-btn">&#10005;</button>
      <div class="result-name" id="result-name"></div>
      <div class="result-stats">
        <div class="stat">
          <span class="stat-value" id="result-grams"></span>
          <span class="stat-label">grams</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-value" id="result-calories"></span>
          <span class="stat-label">kcal</span>
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="scan-btn" class="scan-btn">
        <span class="scan-icon">&#9711;</span>
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
