services:
  release:
    build:
      context: .
      target: builder
    volumes:
      - ./bin:/out
    entrypoint:
      - /bin/sh
      - -c
      - |
        cp /food-scaner /out/food-scaner
        printf "\033[1;32m\n"
        printf "  ╔══════════════════════════════════╗\n"
        printf "  ║      FOOD-SCANER PROD BUILD      ║\n"
        printf "  ║  Built: %-25s║\n" "$(/out/food-scaner --version | sed 's/food-scaner built: //')"
        printf "  ╚══════════════════════════════════╝\n"
        printf "\033[0m\n"


# docker compose -f prod-compose.yml build --no-cache && docker compose -f prod-compose.yml up